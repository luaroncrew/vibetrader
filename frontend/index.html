<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeTrader</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface2: #1c1c2e;
  --border: #2a2a3e;
  --text: #e0e0e8;
  --text-dim: #8888a0;
  --buy: #00e676;
  --sell: #ff1744;
  --hold: #ffc400;
  --accent: #7c4dff;
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Filter tabs */
.filter-bar {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 16px;
  padding: 0 16px;
}
.filter-bar button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 18px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-bar button:hover { border-color: var(--accent); color: var(--text); }
.filter-bar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-bar button.active[data-signal="BUY"] { background: var(--buy); border-color: var(--buy); color: #000; }
.filter-bar button.active[data-signal="SELL"] { background: var(--sell); border-color: var(--sell); color: #fff; }
.filter-bar button.active[data-signal="HOLD"] { background: var(--hold); border-color: var(--hold); color: #000; }

/* Viewer */
.viewer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 16px 30px;
  gap: 16px;
  min-height: 0;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 48px; height: 48px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.2; cursor: default; }

.pair-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  max-width: 1000px;
  width: 100%;
  transition: opacity 0.2s;
}

.pair-labels {
  display: flex;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  font-weight: 600;
}
.pair-labels span {
  flex: 1;
  text-align: center;
  padding: 8px 0;
  background: var(--surface2);
}
.pair-labels span:first-child { border-right: 1px solid var(--border); }

.pair-images {
  display: flex;
  gap: 2px;
  background: #000;
  aspect-ratio: 2 / 1;
}
.pair-images img {
  width: 50%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
}

.pair-meta {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.badge {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 14px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-BUY { background: var(--buy); color: #000; }
.badge-SELL { background: var(--sell); color: #fff; }
.badge-HOLD { background: var(--hold); color: #000; }

.stat {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.stat b { color: var(--text); font-weight: 600; }

.pair-meta .id-label {
  margin-left: auto;
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.pair-prompt {
  margin: 0 20px 14px;
  padding: 10px 14px;
  background: var(--surface2);
  border-radius: 8px;
  font-size: 0.78rem;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
  line-height: 1.5;
}

/* Counter */
.counter {
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-dim);
  padding-bottom: 4px;
}

/* Keyboard hint */
.hint {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  opacity: 0.5;
  padding-bottom: 20px;
}
.hint kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: inherit;
  font-size: 0.68rem;
}

/* Loading */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
  font-size: 0.9rem;
}
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--sell);
  font-size: 0.9rem;
}

/* View tabs */
.view-tabs {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 16px 16px 0;
}
.view-tabs button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.view-tabs button:hover { border-color: var(--accent); color: var(--text); }
.view-tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Comparison view */
.compare-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 16px 30px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

.compare-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.compare-header .checkpoint-name {
  font-size: 1.1rem;
  font-weight: 700;
}

.accuracy-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 20px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.82rem;
  color: var(--text-dim);
}
.accuracy-bar b { color: var(--text); font-weight: 600; }

.triplet-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.triplet-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.triplet-labels {
  display: flex;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  font-weight: 600;
}
.triplet-labels span {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  background: var(--surface2);
  border-right: 1px solid var(--border);
}
.triplet-labels span:last-child { border-right: none; }

.triplet-images {
  display: flex;
  gap: 2px;
  background: #000;
  aspect-ratio: 3 / 1;
}
.triplet-images img {
  width: 33.333%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
  cursor: pointer;
}

.triplet-meta {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.triplet-meta .pred-result {
  margin-left: auto;
  font-size: 0.78rem;
  font-weight: 600;
}
.triplet-meta .pred-result.correct { color: var(--buy); }
.triplet-meta .pred-result.wrong { color: var(--sell); }

.confidence {
  font-size: 0.72rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--text-dim);
}

/* Image modal */
.image-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
}
.image-modal img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}

/* Backtest view */
.backtest-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 16px 30px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

.bt-metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.bt-metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: center;
}
.bt-metric-card .label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.bt-metric-card .value {
  font-size: 1.5rem;
  font-weight: 700;
}
.bt-metric-card .value.positive { color: var(--buy); }
.bt-metric-card .value.negative { color: var(--sell); }
.bt-metric-card .value.neutral { color: var(--hold); }

.bt-chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}
.bt-chart-card .chart-title {
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.bt-chart-card canvas {
  width: 100%;
  height: 280px;
  display: block;
}

.bt-legend {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 10px;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.bt-legend span::before {
  content: '';
  display: inline-block;
  width: 12px;
  height: 3px;
  margin-right: 6px;
  vertical-align: middle;
  border-radius: 2px;
}
.bt-legend .leg-strategy::before { background: var(--buy); }
.bt-legend .leg-buyhold::before { background: var(--sell); }

.bt-table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.bt-table-card .table-title {
  font-size: 0.82rem;
  font-weight: 600;
  padding: 14px 20px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

.bt-table-wrap {
  max-height: 400px;
  overflow-y: auto;
}
.bt-table-wrap::-webkit-scrollbar { width: 6px; }
.bt-table-wrap::-webkit-scrollbar-track { background: var(--surface); }
.bt-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.bt-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
}
.bt-table th {
  position: sticky;
  top: 0;
  background: var(--surface2);
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
}
.bt-table td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.bt-table tr:hover td { background: var(--surface2); }
.bt-table .correct-cell { color: var(--buy); }
.bt-table .wrong-cell { color: var(--sell); }

/* Responsive */
@media (max-width: 700px) {
  .triplet-images { flex-direction: column; aspect-ratio: 1 / 3; }
  .triplet-images img { width: 100%; height: 33.333%; }
  .triplet-labels { flex-direction: column; }
  .triplet-labels span { border-right: none; border-bottom: 1px solid var(--border); }
  .triplet-labels span:last-child { border-bottom: none; }
}
@media (max-width: 600px) {
  .viewer { padding: 12px 8px 20px; gap: 8px; }
  .nav-btn { width: 38px; height: 38px; font-size: 1rem; }
  .pair-images { flex-direction: column; aspect-ratio: 1 / 2; }
  .pair-images img { width: 100%; height: 50%; }
  .pair-labels { flex-direction: column; }
  .pair-labels span:first-child { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>


<div class="view-tabs" id="viewTabs">
  <button class="active" data-view="pairs">Chart Pairs</button>
  <button data-view="compare">Model Comparison</button>
  <button data-view="backtest">Backtest</button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="active" data-signal="ALL">All</button>
  <button data-signal="BUY">Buy</button>
  <button data-signal="SELL">Sell</button>
  <button data-signal="HOLD">Hold</button>
</div>

<div class="viewer" id="viewer">
  <div class="loading" id="loadingMsg"><div class="spinner"></div>Loading metadata&hellip;</div>

  <button class="nav-btn" id="prevBtn" title="Previous (Left Arrow)" style="display:none">&larr;</button>
  <div class="pair-card" id="pairCard" style="display:none">
    <div class="pair-labels"><span>Input</span><span>Target</span></div>
    <div class="pair-images">
      <img id="imgInput" alt="Input">
      <img id="imgTarget" alt="Target">
    </div>
    <div class="pair-meta">
      <span class="badge" id="metaBadge"></span>
      <span class="stat" id="metaChange"></span>
      <span class="stat" id="metaRsi"></span>
      <span class="stat" id="metaMacd"></span>
      <span class="id-label" id="metaId"></span>
    </div>
    <div class="pair-prompt" id="metaPrompt"></div>
    <div class="counter" id="metaCounter"></div>
  </div>
  <button class="nav-btn" id="nextBtn" title="Next (Right Arrow)" style="display:none">&rarr;</button>
</div>

<div class="hint" id="pairsHint"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> arrow keys to navigate</div>

<div class="compare-view" id="compareView" style="display:none">
  <div class="compare-header">
    <button class="nav-btn" id="cmpPrevBtn" title="Previous checkpoint">&larr;</button>
    <span class="checkpoint-name" id="cmpCheckpointName"></span>
    <button class="nav-btn" id="cmpNextBtn" title="Next checkpoint">&rarr;</button>
  </div>
  <div class="accuracy-bar" id="cmpAccuracy"></div>
  <div class="triplet-grid" id="cmpGrid"></div>
  <div class="hint" style="margin-top:16px"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> switch checkpoints</div>
</div>

<div class="backtest-view" id="backtestView" style="display:none">
  <div class="bt-metrics" id="btMetrics"></div>
  <div class="bt-chart-card">
    <div class="chart-title">Cumulative Returns</div>
    <canvas id="btCanvas"></canvas>
    <div class="bt-legend">
      <span class="leg-strategy">Model Strategy</span>
      <span class="leg-buyhold">Buy & Hold</span>
    </div>
  </div>
  <div class="bt-table-card">
    <div class="table-title">Trade Log</div>
    <div class="bt-table-wrap">
      <table class="bt-table" id="btTable">
        <thead><tr>
          <th>#</th><th>Predicted</th><th>Actual</th><th>Conf</th><th>Price %</th><th>Result</th><th>Return</th>
        </tr></thead>
        <tbody id="btTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="image-modal" id="imageModal" style="display:none">
  <img id="modalImg" alt="Zoomed">
</div>

<script>
let allData = [];
let filtered = [];
let currentIndex = 0;

const loadingMsg = document.getElementById('loadingMsg');
const pairCard = document.getElementById('pairCard');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const imgInput = document.getElementById('imgInput');
const imgTarget = document.getElementById('imgTarget');
const metaBadge = document.getElementById('metaBadge');
const metaChange = document.getElementById('metaChange');
const metaRsi = document.getElementById('metaRsi');
const metaMacd = document.getElementById('metaMacd');
const metaId = document.getElementById('metaId');
const metaPrompt = document.getElementById('metaPrompt');
const metaCounter = document.getElementById('metaCounter');

fetch('../data/rendered/metadata.json')
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    allData = data;
    applyFilter('ALL');
  })
  .catch(err => {
    loadingMsg.innerHTML = `<span style="color:var(--sell)">Failed to load metadata: ${err.message}<br><br>
      Serve from the project root:<br>
      <code>python -m http.server 8000</code></span>`;
  });


// Filtering
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(btn.dataset.signal);
});

function applyFilter(signal) {
  filtered = signal === 'ALL' ? allData : allData.filter(d => d.signal === signal);
  currentIndex = 0;
  render();
}

function go(delta) {
  const next = currentIndex + delta;
  if (next < 0 || next >= filtered.length) return;
  currentIndex = next;
  render();
}

function render() {
  if (filtered.length === 0) {
    loadingMsg.style.display = '';
    loadingMsg.innerHTML = 'No pairs found for this filter.';
    pairCard.style.display = 'none';
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    return;
  }

  loadingMsg.style.display = 'none';
  pairCard.style.display = '';
  prevBtn.style.display = '';
  nextBtn.style.display = '';

  const d = filtered[currentIndex];

  imgInput.src = `../data/rendered/input/${d.id}.png`;
  imgTarget.src = `../data/rendered/target/${d.id}.png`;

  metaBadge.className = `badge badge-${d.signal}`;
  metaBadge.textContent = d.signal;
  metaChange.innerHTML = `<b>${(d.pct_change * 100).toFixed(2)}%</b> change`;
  metaRsi.innerHTML = `RSI <b>${d.rsi}</b>`;
  metaMacd.innerHTML = `MACD <b>${d.macd}</b>`;
  metaId.textContent = `#${d.id}`;
  metaPrompt.textContent = d.prompt;
  metaCounter.textContent = `${currentIndex + 1} / ${filtered.length}`;

  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex >= filtered.length - 1;
}

prevBtn.addEventListener('click', () => go(-1));
nextBtn.addEventListener('click', () => go(1));

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') {
    if (activeView === 'pairs') go(-1);
    else cmpGo(-1);
  }
  if (e.key === 'ArrowRight') {
    if (activeView === 'pairs') go(1);
    else cmpGo(1);
  }
  if (e.key === 'Escape') closeModal();
});

// ======================
// View tabs
// ======================
let activeView = 'pairs';
const viewTabs = document.getElementById('viewTabs');
const filterBar = document.getElementById('filterBar');
const viewer = document.getElementById('viewer');
const pairsHint = document.getElementById('pairsHint');
const compareView = document.getElementById('compareView');

viewTabs.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  viewTabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  switchView(btn.dataset.view);
});

const backtestView = document.getElementById('backtestView');

function switchView(view) {
  activeView = view;
  filterBar.style.display = 'none';
  viewer.style.display = 'none';
  pairsHint.style.display = 'none';
  compareView.style.display = 'none';
  backtestView.style.display = 'none';

  if (view === 'pairs') {
    filterBar.style.display = '';
    viewer.style.display = '';
    pairsHint.style.display = '';
  } else if (view === 'compare') {
    compareView.style.display = '';
    if (!cmpData) fetchComparison();
  } else if (view === 'backtest') {
    backtestView.style.display = '';
    if (!btLoaded) fetchBacktest();
  }
}

// ======================
// Comparison view
// ======================
let cmpData = null;
let cmpModelIndex = 0;  // which checkpoint we're viewing

const cmpPrevBtn = document.getElementById('cmpPrevBtn');
const cmpNextBtn = document.getElementById('cmpNextBtn');
const cmpCheckpointName = document.getElementById('cmpCheckpointName');
const cmpGrid = document.getElementById('cmpGrid');
const cmpAccuracy = document.getElementById('cmpAccuracy');

cmpPrevBtn.addEventListener('click', () => cmpGo(-1));
cmpNextBtn.addEventListener('click', () => cmpGo(1));

function cmpGo(delta) {
  if (!cmpData) return;
  const next = cmpModelIndex + delta;
  if (next < 0 || next >= cmpData.models.length) return;
  cmpModelIndex = next;
  renderComparison();
}

function fetchComparison() {
  cmpGrid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading comparison data&hellip;</div>';
  fetch('../outputs/comparisons/comparison.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      cmpData = data;
      cmpModelIndex = 0;
      renderComparison();
    })
    .catch(err => {
      cmpGrid.innerHTML = `<div class="error-msg">Failed to load comparison data: ${err.message}<br><br>
        Generate it first:<br>
        <code>python -m inference.generate_comparison --max-samples 10 --device mps</code></div>`;
    });
}

function renderComparison() {
  if (!cmpData || cmpData.models.length === 0) return;

  const model = cmpData.models[cmpModelIndex];

  // Checkpoint nav
  cmpCheckpointName.textContent = model.name;
  cmpPrevBtn.disabled = cmpModelIndex === 0;
  cmpNextBtn.disabled = cmpModelIndex >= cmpData.models.length - 1;

  // Hide nav arrows if only one checkpoint
  const showNav = cmpData.models.length > 1;
  cmpPrevBtn.style.display = showNav ? '' : 'none';
  cmpNextBtn.style.display = showNav ? '' : 'none';

  // Accuracy for this checkpoint
  let correct = 0, total = 0;
  for (let i = 0; i < cmpData.samples.length; i++) {
    const pred = model.predictions[i];
    if (!pred) continue;
    total++;
    if (pred.signal === cmpData.samples[i].ground_truth) correct++;
  }
  const accPct = total > 0 ? ((correct / total) * 100).toFixed(0) : '—';
  cmpAccuracy.innerHTML = `Accuracy: <b>${correct}</b> / ${total} (<b>${accPct}%</b>)`;

  // Pick 3 evenly spaced samples to display
  const totalSamples = cmpData.samples.length;
  const displayIndices = totalSamples <= 3
    ? Array.from({length: totalSamples}, (_, i) => i)
    : [0, Math.floor(totalSamples / 2), totalSamples - 1];

  // Build triplet rows
  let html = '';
  for (const i of displayIndices) {
    const sample = cmpData.samples[i];
    const pred = model.predictions[i];

    const predSignal = pred ? pred.signal : '—';
    const predConf = pred ? `${(pred.confidence * 100).toFixed(0)}%` : '';
    const isCorrect = pred && pred.signal === sample.ground_truth;
    const resultClass = pred ? (isCorrect ? 'correct' : 'wrong') : '';
    const resultText = pred ? (isCorrect ? 'Correct' : 'Wrong') : 'N/A';
    const predImgSrc = pred
      ? `../outputs/comparisons/${pred.image}`
      : '';

    html += `
      <div class="triplet-row">
        <div class="triplet-labels">
          <span>Input</span>
          <span>Target (${sample.ground_truth})</span>
          <span>Prediction</span>
        </div>
        <div class="triplet-images">
          <img src="../outputs/comparisons/inputs/${sample.id}.png" alt="Input" onclick="openModal(this.src)">
          <img src="../outputs/comparisons/targets/${sample.id}.png" alt="Target" onclick="openModal(this.src)">
          ${pred
            ? `<img src="${predImgSrc}" alt="Prediction" onclick="openModal(this.src)">`
            : `<div style="width:33.333%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:0.8rem">No prediction</div>`
          }
        </div>
        <div class="triplet-meta">
          <span class="badge badge-${sample.ground_truth}">${sample.ground_truth}</span>
          <span class="stat"><b>${(sample.pct_change * 100).toFixed(2)}%</b></span>
          <span class="stat">RSI <b>${sample.rsi}</b></span>
          ${pred ? `<span class="badge badge-${predSignal}">${predSignal}</span><span class="confidence">${predConf}</span><span class="confidence" style="opacity:0.6">${(pred.green_pct*100).toFixed(0)}%g / ${(pred.red_pct*100).toFixed(0)}%r</span>` : ''}
          <span class="pred-result ${resultClass}">${resultText}</span>
        </div>
      </div>
    `;
  }

  cmpGrid.innerHTML = html;
}

// ======================
// Backtest view
// ======================
let btLoaded = false;

function fetchBacktest() {
  const btMetrics = document.getElementById('btMetrics');
  btMetrics.innerHTML = '<div class="loading"><div class="spinner"></div>Loading backtest data&hellip;</div>';

  Promise.all([
    fetch('../outputs/backtest_250/backtest_metrics.json').then(r => {
      if (!r.ok) throw new Error(`Metrics HTTP ${r.status}`);
      return r.json();
    }),
    fetch('../outputs/backtest_250/backtest_results.csv').then(r => {
      if (!r.ok) throw new Error(`Results HTTP ${r.status}`);
      return r.text();
    })
  ])
  .then(([metrics, csvText]) => {
    btLoaded = true;
    const trades = parseCSV(csvText);
    renderBacktest(metrics, trades);
  })
  .catch(err => {
    btMetrics.innerHTML = `<div class="error-msg" style="grid-column:1/-1">Failed to load backtest data: ${err.message}<br><br>
      Run the backtest first:<br>
      <code>python -m bot.backtest</code></div>`;
  });
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i]);
    obj.confidence = parseFloat(obj.confidence);
    obj.pct_change = parseFloat(obj.pct_change);
    obj.strategy_return = parseFloat(obj.strategy_return);
    obj.correct = obj.correct === 'True';
    obj.idx = parseInt(obj.idx);
    return obj;
  });
}

function renderBacktest(metrics, trades) {
  const btMetrics = document.getElementById('btMetrics');

  const stratRet = (metrics.strategy_return * 100).toFixed(1);
  const bhRet = (metrics.buy_hold_return * 100).toFixed(1);
  const acc = (metrics.accuracy * 100).toFixed(1);
  const buyAcc = (metrics.buy_accuracy * 100).toFixed(1);
  const sellAcc = (metrics.sell_accuracy * 100).toFixed(1);

  btMetrics.innerHTML = `
    <div class="bt-metric-card">
      <div class="label">Strategy Return</div>
      <div class="value ${metrics.strategy_return >= 0 ? 'positive' : 'negative'}">+${stratRet}%</div>
    </div>
    <div class="bt-metric-card">
      <div class="label">Buy & Hold</div>
      <div class="value ${metrics.buy_hold_return >= 0 ? 'positive' : 'negative'}">${bhRet}%</div>
    </div>
    <div class="bt-metric-card">
      <div class="label">Accuracy</div>
      <div class="value neutral">${acc}%</div>
    </div>
    <div class="bt-metric-card">
      <div class="label">Buy Accuracy</div>
      <div class="value neutral">${buyAcc}%</div>
    </div>
    <div class="bt-metric-card">
      <div class="label">Sell Accuracy</div>
      <div class="value neutral">${sellAcc}%</div>
    </div>
    <div class="bt-metric-card">
      <div class="label">Samples</div>
      <div class="value" style="color:var(--text)">${metrics.n_samples}</div>
    </div>
  `;

  drawEquityCurve(trades);
  renderTradeTable(trades);
}

function drawEquityCurve(trades) {
  const canvas = document.getElementById('btCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  // Compute cumulative returns
  let cumStrategy = [0];
  let cumBuyHold = [0];
  for (let i = 0; i < trades.length; i++) {
    cumStrategy.push(cumStrategy[i] + trades[i].strategy_return);
    cumBuyHold.push(cumBuyHold[i] + trades[i].pct_change);
  }

  const allVals = [...cumStrategy, ...cumBuyHold];
  const minVal = Math.min(...allVals);
  const maxVal = Math.max(...allVals);
  const range = maxVal - minVal || 1;

  const padL = 55, padR = 16, padT = 16, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  function toX(i) { return padL + (i / (cumStrategy.length - 1)) * chartW; }
  function toY(v) { return padT + chartH - ((v - minVal) / range) * chartH; }

  // Background
  ctx.fillStyle = '#14141f';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#2a2a3e';
  ctx.lineWidth = 0.5;
  const nGrid = 5;
  for (let i = 0; i <= nGrid; i++) {
    const v = minVal + (range * i / nGrid);
    const y = toY(v);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W - padR, y);
    ctx.stroke();

    ctx.fillStyle = '#8888a0';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((v * 100).toFixed(0) + '%', padL - 8, y + 4);
  }

  // Zero line
  if (minVal < 0 && maxVal > 0) {
    ctx.strokeStyle = '#4a4a5e';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(padL, toY(0));
    ctx.lineTo(W - padR, toY(0));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // X-axis labels
  ctx.fillStyle = '#8888a0';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  const xTicks = 5;
  for (let i = 0; i <= xTicks; i++) {
    const idx = Math.round((cumStrategy.length - 1) * i / xTicks);
    ctx.fillText(idx, toX(idx), H - 8);
  }

  // Draw lines
  function drawLine(data, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < data.length; i++) {
      const x = toX(i);
      const y = toY(data[i]);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  drawLine(cumBuyHold, '#ff1744');
  drawLine(cumStrategy, '#00e676');
}

function renderTradeTable(trades) {
  const tbody = document.getElementById('btTbody');
  let html = '';
  trades.forEach((t, i) => {
    const retPct = (t.strategy_return * 100).toFixed(2);
    const pctChg = (t.pct_change * 100).toFixed(2);
    const cls = t.correct ? 'correct-cell' : 'wrong-cell';
    html += `<tr>
      <td>${i + 1}</td>
      <td><span class="badge badge-${t.predicted}" style="font-size:0.68rem;padding:2px 8px">${t.predicted}</span></td>
      <td><span class="badge badge-${t.actual}" style="font-size:0.68rem;padding:2px 8px">${t.actual}</span></td>
      <td>${(t.confidence * 100).toFixed(0)}%</td>
      <td style="color:${t.pct_change >= 0 ? 'var(--buy)' : 'var(--sell)'}">${pctChg}%</td>
      <td class="${cls}">${t.correct ? 'Correct' : 'Wrong'}</td>
      <td style="color:${t.strategy_return >= 0 ? 'var(--buy)' : 'var(--sell)'}">${t.strategy_return >= 0 ? '+' : ''}${retPct}%</td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

  modalImg.src = src;
  imageModal.style.display = '';
