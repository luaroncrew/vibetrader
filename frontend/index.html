<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeTrader</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface2: #1c1c2e;
  --border: #2a2a3e;
  --text: #e0e0e8;
  --text-dim: #8888a0;
  --buy: #00e676;
  --sell: #ff1744;
  --hold: #ffc400;
  --accent: #7c4dff;
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Filter tabs */
.filter-bar {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 16px;
  padding: 0 16px;
}
.filter-bar button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 18px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-bar button:hover { border-color: var(--accent); color: var(--text); }
.filter-bar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-bar button.active[data-signal="BUY"] { background: var(--buy); border-color: var(--buy); color: #000; }
.filter-bar button.active[data-signal="SELL"] { background: var(--sell); border-color: var(--sell); color: #fff; }
.filter-bar button.active[data-signal="HOLD"] { background: var(--hold); border-color: var(--hold); color: #000; }

/* Viewer */
.viewer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 16px 30px;
  gap: 16px;
  min-height: 0;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 48px; height: 48px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.2; cursor: default; }

.pair-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  max-width: 1000px;
  width: 100%;
  transition: opacity 0.2s;
}

.pair-labels {
  display: flex;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  font-weight: 600;
}
.pair-labels span {
  flex: 1;
  text-align: center;
  padding: 8px 0;
  background: var(--surface2);
}
.pair-labels span:first-child { border-right: 1px solid var(--border); }

.pair-images {
  display: flex;
  gap: 2px;
  background: #000;
  aspect-ratio: 2 / 1;
}
.pair-images img {
  width: 50%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
}

.pair-meta {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.badge {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 14px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-BUY { background: var(--buy); color: #000; }
.badge-SELL { background: var(--sell); color: #fff; }
.badge-HOLD { background: var(--hold); color: #000; }

.stat {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.stat b { color: var(--text); font-weight: 600; }

.pair-meta .id-label {
  margin-left: auto;
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.pair-prompt {
  margin: 0 20px 14px;
  padding: 10px 14px;
  background: var(--surface2);
  border-radius: 8px;
  font-size: 0.78rem;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
  line-height: 1.5;
}

/* Counter */
.counter {
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-dim);
  padding-bottom: 4px;
}

/* Keyboard hint */
.hint {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  opacity: 0.5;
  padding-bottom: 20px;
}
.hint kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: inherit;
  font-size: 0.68rem;
}

/* Loading */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
  font-size: 0.9rem;
}
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--sell);
  font-size: 0.9rem;
}

/* View tabs */
.view-tabs {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 16px 16px 0;
}
.view-tabs button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.view-tabs button:hover { border-color: var(--accent); color: var(--text); }
.view-tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Comparison view */
.compare-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 16px 30px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

.compare-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.compare-header .checkpoint-name {
  font-size: 1.1rem;
  font-weight: 700;
}

.accuracy-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 20px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.82rem;
  color: var(--text-dim);
}
.accuracy-bar b { color: var(--text); font-weight: 600; }

.triplet-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.triplet-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.triplet-labels {
  display: flex;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  font-weight: 600;
}
.triplet-labels span {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  background: var(--surface2);
  border-right: 1px solid var(--border);
}
.triplet-labels span:last-child { border-right: none; }

.triplet-images {
  display: flex;
  gap: 2px;
  background: #000;
  aspect-ratio: 3 / 1;
}
.triplet-images img {
  width: 33.333%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
  cursor: pointer;
}

.triplet-meta {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.triplet-meta .pred-result {
  margin-left: auto;
  font-size: 0.78rem;
  font-weight: 600;
}
.triplet-meta .pred-result.correct { color: var(--buy); }
.triplet-meta .pred-result.wrong { color: var(--sell); }

.confidence {
  font-size: 0.72rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--text-dim);
}

/* Image modal */
.image-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
}
.image-modal img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}

/* Responsive */
@media (max-width: 700px) {
  .triplet-images { flex-direction: column; aspect-ratio: 1 / 3; }
  .triplet-images img { width: 100%; height: 33.333%; }
  .triplet-labels { flex-direction: column; }
  .triplet-labels span { border-right: none; border-bottom: 1px solid var(--border); }
  .triplet-labels span:last-child { border-bottom: none; }
}
@media (max-width: 600px) {
  .viewer { padding: 12px 8px 20px; gap: 8px; }
  .nav-btn { width: 38px; height: 38px; font-size: 1rem; }
  .pair-images { flex-direction: column; aspect-ratio: 1 / 2; }
  .pair-images img { width: 100%; height: 50%; }
  .pair-labels { flex-direction: column; }
  .pair-labels span:first-child { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>


<div class="view-tabs" id="viewTabs">
  <button class="active" data-view="pairs">Chart Pairs</button>
  <button data-view="compare">Model Comparison</button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="active" data-signal="ALL">All</button>
  <button data-signal="BUY">Buy</button>
  <button data-signal="SELL">Sell</button>
  <button data-signal="HOLD">Hold</button>
</div>

<div class="viewer" id="viewer">
  <div class="loading" id="loadingMsg"><div class="spinner"></div>Loading metadata&hellip;</div>

  <button class="nav-btn" id="prevBtn" title="Previous (Left Arrow)" style="display:none">&larr;</button>
  <div class="pair-card" id="pairCard" style="display:none">
    <div class="pair-labels"><span>Input</span><span>Target</span></div>
    <div class="pair-images">
      <img id="imgInput" alt="Input">
      <img id="imgTarget" alt="Target">
    </div>
    <div class="pair-meta">
      <span class="badge" id="metaBadge"></span>
      <span class="stat" id="metaChange"></span>
      <span class="stat" id="metaRsi"></span>
      <span class="stat" id="metaMacd"></span>
      <span class="id-label" id="metaId"></span>
    </div>
    <div class="pair-prompt" id="metaPrompt"></div>
    <div class="counter" id="metaCounter"></div>
  </div>
  <button class="nav-btn" id="nextBtn" title="Next (Right Arrow)" style="display:none">&rarr;</button>
</div>

<div class="hint" id="pairsHint"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> arrow keys to navigate</div>

<div class="compare-view" id="compareView" style="display:none">
  <div class="compare-header">
    <button class="nav-btn" id="cmpPrevBtn" title="Previous checkpoint">&larr;</button>
    <span class="checkpoint-name" id="cmpCheckpointName"></span>
    <button class="nav-btn" id="cmpNextBtn" title="Next checkpoint">&rarr;</button>
  </div>
  <div class="accuracy-bar" id="cmpAccuracy"></div>
  <div class="triplet-grid" id="cmpGrid"></div>
  <div class="hint" style="margin-top:16px"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> switch checkpoints</div>
</div>

<div class="image-modal" id="imageModal" style="display:none">
  <img id="modalImg" alt="Zoomed">
</div>

<script>
let allData = [];
let filtered = [];
let currentIndex = 0;

const loadingMsg = document.getElementById('loadingMsg');
const pairCard = document.getElementById('pairCard');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const imgInput = document.getElementById('imgInput');
const imgTarget = document.getElementById('imgTarget');
const metaBadge = document.getElementById('metaBadge');
const metaChange = document.getElementById('metaChange');
const metaRsi = document.getElementById('metaRsi');
const metaMacd = document.getElementById('metaMacd');
const metaId = document.getElementById('metaId');
const metaPrompt = document.getElementById('metaPrompt');
const metaCounter = document.getElementById('metaCounter');

fetch('../data/rendered/metadata.json')
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    allData = data;
    applyFilter('ALL');
  })
  .catch(err => {
    loadingMsg.innerHTML = `<span style="color:var(--sell)">Failed to load metadata: ${err.message}<br><br>
      Serve from the project root:<br>
      <code>python -m http.server 8000</code></span>`;
  });


// Filtering
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(btn.dataset.signal);
});

function applyFilter(signal) {
  filtered = signal === 'ALL' ? allData : allData.filter(d => d.signal === signal);
  currentIndex = 0;
  render();
}

function go(delta) {
  const next = currentIndex + delta;
  if (next < 0 || next >= filtered.length) return;
  currentIndex = next;
  render();
}

function render() {
  if (filtered.length === 0) {
    loadingMsg.style.display = '';
    loadingMsg.innerHTML = 'No pairs found for this filter.';
    pairCard.style.display = 'none';
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    return;
  }

  loadingMsg.style.display = 'none';
  pairCard.style.display = '';
  prevBtn.style.display = '';
  nextBtn.style.display = '';

  const d = filtered[currentIndex];

  imgInput.src = `../data/rendered/input/${d.id}.png`;
  imgTarget.src = `../data/rendered/target/${d.id}.png`;

  metaBadge.className = `badge badge-${d.signal}`;
  metaBadge.textContent = d.signal;
  metaChange.innerHTML = `<b>${(d.pct_change * 100).toFixed(2)}%</b> change`;
  metaRsi.innerHTML = `RSI <b>${d.rsi}</b>`;
  metaMacd.innerHTML = `MACD <b>${d.macd}</b>`;
  metaId.textContent = `#${d.id}`;
  metaPrompt.textContent = d.prompt;
  metaCounter.textContent = `${currentIndex + 1} / ${filtered.length}`;

  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex >= filtered.length - 1;
}

prevBtn.addEventListener('click', () => go(-1));
nextBtn.addEventListener('click', () => go(1));

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') {
    if (activeView === 'pairs') go(-1);
    else cmpGo(-1);
  }
  if (e.key === 'ArrowRight') {
    if (activeView === 'pairs') go(1);
    else cmpGo(1);
  }
  if (e.key === 'Escape') closeModal();
});

// ======================
// View tabs
// ======================
let activeView = 'pairs';
const viewTabs = document.getElementById('viewTabs');
const filterBar = document.getElementById('filterBar');
const viewer = document.getElementById('viewer');
const pairsHint = document.getElementById('pairsHint');
const compareView = document.getElementById('compareView');

viewTabs.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  viewTabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  switchView(btn.dataset.view);
});

function switchView(view) {
  activeView = view;
  if (view === 'pairs') {
    filterBar.style.display = '';
    viewer.style.display = '';
    pairsHint.style.display = '';
    compareView.style.display = 'none';
  } else {
    filterBar.style.display = 'none';
    viewer.style.display = 'none';
    pairsHint.style.display = 'none';
    compareView.style.display = '';
    if (!cmpData) fetchComparison();
  }
}

// ======================
// Comparison view
// ======================
let cmpData = null;
let cmpModelIndex = 0;  // which checkpoint we're viewing

const cmpPrevBtn = document.getElementById('cmpPrevBtn');
const cmpNextBtn = document.getElementById('cmpNextBtn');
const cmpCheckpointName = document.getElementById('cmpCheckpointName');
const cmpGrid = document.getElementById('cmpGrid');
const cmpAccuracy = document.getElementById('cmpAccuracy');

cmpPrevBtn.addEventListener('click', () => cmpGo(-1));
cmpNextBtn.addEventListener('click', () => cmpGo(1));

function cmpGo(delta) {
  if (!cmpData) return;
  const next = cmpModelIndex + delta;
  if (next < 0 || next >= cmpData.models.length) return;
  cmpModelIndex = next;
  renderComparison();
}

function fetchComparison() {
  cmpGrid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading comparison data&hellip;</div>';
  fetch('../outputs/comparisons/comparison.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      cmpData = data;
      cmpModelIndex = 0;
      renderComparison();
    })
    .catch(err => {
      cmpGrid.innerHTML = `<div class="error-msg">Failed to load comparison data: ${err.message}<br><br>
        Generate it first:<br>
        <code>python -m inference.generate_comparison --max-samples 10 --device mps</code></div>`;
    });
}

function renderComparison() {
  if (!cmpData || cmpData.models.length === 0) return;

  const model = cmpData.models[cmpModelIndex];

  // Checkpoint nav
  cmpCheckpointName.textContent = model.name;
  cmpPrevBtn.disabled = cmpModelIndex === 0;
  cmpNextBtn.disabled = cmpModelIndex >= cmpData.models.length - 1;

  // Hide nav arrows if only one checkpoint
  const showNav = cmpData.models.length > 1;
  cmpPrevBtn.style.display = showNav ? '' : 'none';
  cmpNextBtn.style.display = showNav ? '' : 'none';

  // Accuracy for this checkpoint
  let correct = 0, total = 0;
  for (let i = 0; i < cmpData.samples.length; i++) {
    const pred = model.predictions[i];
    if (!pred) continue;
    total++;
    if (pred.signal === cmpData.samples[i].ground_truth) correct++;
  }
  const accPct = total > 0 ? ((correct / total) * 100).toFixed(0) : '—';
  cmpAccuracy.innerHTML = `Accuracy: <b>${correct}</b> / ${total} (<b>${accPct}%</b>)`;

  // Build triplet rows
  let html = '';
  for (let i = 0; i < cmpData.samples.length; i++) {
    const sample = cmpData.samples[i];
    const pred = model.predictions[i];

    const predSignal = pred ? pred.signal : '—';
    const predConf = pred ? `${(pred.confidence * 100).toFixed(0)}%` : '';
    const isCorrect = pred && pred.signal === sample.ground_truth;
    const resultClass = pred ? (isCorrect ? 'correct' : 'wrong') : '';
    const resultText = pred ? (isCorrect ? 'Correct' : 'Wrong') : 'N/A';
    const predImgSrc = pred
      ? `../outputs/comparisons/${pred.image}`
      : '';

    html += `
      <div class="triplet-row">
        <div class="triplet-labels">
          <span>Input</span>
          <span>Target (${sample.ground_truth})</span>
          <span>Prediction</span>
        </div>
        <div class="triplet-images">
          <img src="../outputs/comparisons/inputs/${sample.id}.png" alt="Input" onclick="openModal(this.src)">
          <img src="../outputs/comparisons/targets/${sample.id}.png" alt="Target" onclick="openModal(this.src)">
          ${pred
            ? `<img src="${predImgSrc}" alt="Prediction" onclick="openModal(this.src)">`
            : `<div style="width:33.333%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:0.8rem">No prediction</div>`
          }
        </div>
        <div class="triplet-meta">
          <span class="badge badge-${sample.ground_truth}">${sample.ground_truth}</span>
          <span class="stat"><b>${(sample.pct_change * 100).toFixed(2)}%</b></span>
          <span class="stat">RSI <b>${sample.rsi}</b></span>
          ${pred ? `<span class="badge badge-${predSignal}">${predSignal}</span><span class="confidence">${predConf}</span><span class="confidence" style="opacity:0.6">${(pred.green_pct*100).toFixed(0)}%g / ${(pred.red_pct*100).toFixed(0)}%r</span>` : ''}
          <span class="pred-result ${resultClass}">${resultText}</span>
        </div>
      </div>
    `;
  }

  cmpGrid.innerHTML = html;
}

// ======================
// Image modal
// ======================
const imageModal = document.getElementById('imageModal');
const modalImg = document.getElementById('modalImg');

function openModal(src) {
  modalImg.src = src;
  imageModal.style.display = '';
}

function closeModal() {
  imageModal.style.display = 'none';
}

imageModal.addEventListener('click', closeModal);
</script>
</body>
</html>
